<!doctype html>
<html>
  <head>
    <title>Mini LMS Login</title>
    <link rel="stylesheet" href="css/style.css" />

    <style>
      .login-box {
        width: 350px;
        margin: 120px auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .login-box h2 {
        text-align: center;
        margin-bottom: 20px;
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <h2>Mini LMS Login</h2>

      <form action="http://localhost:7071/api/loginUser" method="post">
        <label>Username</label>
        <input type="text" name="username" />

        <label>Password</label>
        <input type="password" name="password" />

        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
